<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Explorador Interactivo - Transformaciones</title>
  <script src="./plotly.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    h1 { color: #003874; }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; margin: 20px 0; }
    .control { display: flex; flex-direction: column; }
    label { font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
    input[type="range"] { width: 100%; }
    select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    #plot { width: 100%; height: 400px; border: 1px solid #ddd; }
    .formula { background: #003874; color: white; padding: 10px; border-radius: 4px; text-align: center; margin: 10px 0; }
  </style>
</head>
<body>

<div class="container">
  <h1>Explorador Interactivo</h1>
  
  <div class="controls">
    <div class="control">
      <label>Función base</label>
      <select id="baseFn">
        <option value="quad" selected>Cuadrática: x²</option>
        <option value="linear">Lineal: x</option>
        <option value="cubic">Cúbica: x³</option>
      </select>
    </div>
    
    <div class="control">
      <label>Traslación horizontal (h)</label>
      <input type="range" id="h" min="-4" max="4" step="0.5" value="0">
      <div id="hValue">h = 0</div>
    </div>
    
    <div class="control">
      <label>Traslación vertical (a)</label>
      <input type="range" id="a" min="-5" max="5" step="0.5" value="0">
      <div id="aValue">a = 0</div>
    </div>
    
    <div class="control">
      <label>Escala vertical (k)</label>
      <input type="range" id="k" min="-3" max="3" step="0.25" value="1">
      <div id="kValue">k = 1</div>
    </div>
  </div>
  
  <div class="formula" id="formulaDisplay">g(x) = x²</div>
  <div id="plot"></div>
</div>

<script>
// Paleta
const C_AZUL = '#003874';
const C_GRIS = '#aaaaaa';

// Funciones base
function fnBase(type, x) {
  if (type === 'linear') return x;
  if (type === 'quad') return x * x;
  if (type === 'cubic') return x * x * x;
  return 0;
}

// Generar puntos
function linspace(a, b, n = 200) {
  return Array.from({ length: n }, (_, i) => a + i * (b - a) / (n - 1));
}

// Actualizar gráfica
function updatePlot() {
  const type = document.getElementById('baseFn').value;
  const h = parseFloat(document.getElementById('h').value);
  const a = parseFloat(document.getElementById('a').value);
  const k = parseFloat(document.getElementById('k').value);
  
  // Actualizar valores mostrados
  document.getElementById('hValue').textContent = `h = ${h}`;
  document.getElementById('aValue').textContent = `a = ${a}`;
  document.getElementById('kValue').textContent = `k = ${k}`;
  
  // Actualizar fórmula
  const baseLabel = type === 'linear' ? 'x' : type === 'quad' ? 'x²' : 'x³';
  let formula = 'g(x) = ';
  if (Math.abs(k) !== 1) {
    formula += k < 0 ? `−${Math.abs(k)}` : `${k}`;
  } else if (k === -1) {
    formula += '−';
  }
  const hStr = h === 0 ? 'x' : h > 0 ? `(x − ${h})` : `(x + ${Math.abs(h)})`;
  const exp = type === 'linear' ? '' : type === 'quad' ? '²' : '³';
  formula += hStr + exp;
  if (a !== 0) formula += a > 0 ? ` + ${a}` : ` − ${Math.abs(a)}`;
  document.getElementById('formulaDisplay').textContent = formula;
  
  // Generar datos
  const xs = linspace(-8, 8, 400);
  const ysBase = xs.map(x => fnBase(type, x));
  const ysNew = xs.map(x => k * fnBase(type, x - h) + a);
  
  // Crear trazas
  const traces = [
    {
      x: xs,
      y: ysBase,
      mode: 'lines',
      name: `f(x) = ${baseLabel}`,
      line: { color: C_GRIS, dash: 'dot', width: 2 }
    },
    {
      x: xs,
      y: ysNew,
      mode: 'lines',
      name: 'g(x)',
      line: { color: C_AZUL, width: 3 }
    }
  ];
  
  // Layout
  const yRange = type === 'cubic' ? [-15, 15] : [-6, 15];
  const layout = {
    title: '',
    margin: { l: 50, r: 30, t: 20, b: 40 },
    xaxis: { range: [-6, 6] },
    yaxis: { range: yRange },
    hovermode: 'closest'
  };
  
  // Renderizar
  Plotly.react('plot', traces, layout, { responsive: true });
}

// Event listeners
document.getElementById('baseFn').addEventListener('change', updatePlot);
document.getElementById('h').addEventListener('input', updatePlot);
document.getElementById('a').addEventListener('input', updatePlot);
document.getElementById('k').addEventListener('input', updatePlot);

// Inicializar
window.addEventListener('load', updatePlot);
setTimeout(updatePlot, 100);  // Fallback
</script>

</body>
</html>
