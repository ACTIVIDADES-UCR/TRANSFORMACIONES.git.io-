<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorador Interactivo - Transformaciones</title>
  <script src="./plotly.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 900px;
      width: 100%;
    }
    h1 { color: #333; margin-bottom: 10px; }
    .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .control {
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }
    select, input[type="range"] {
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
    }
    select { cursor: pointer; }
    select:focus, input:focus { outline: none; border-color: #667eea; }
    input[type="range"] { cursor: pointer; }
    .value-display {
      color: #667eea;
      font-weight: 600;
      font-size: 13px;
      margin-top: 4px;
    }
    .formula-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 20px;
    }
    #plot {
      width: 100%;
      height: 400px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }
    .error { color: red; padding: 10px; background: #ffe6e6; border-radius: 6px; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎛️ Explorador Interactivo</h1>
  <p class="subtitle">Ajusta los parámetros y observa cómo cambia la gráfica en tiempo real</p>
  
  <div class="controls">
    <div class="control">
      <label for="baseFn">Función base f(x)</label>
      <select id="baseFn">
        <option value="quad">Cuadrática: x²</option>
        <option value="linear">Lineal: x</option>
        <option value="cubic">Cúbica: x³</option>
      </select>
    </div>
    <div class="control">
      <label for="hSlider">Traslación horizontal (h)</label>
      <input type="range" id="hSlider" min="-4" max="4" step="0.5" value="0">
      <div class="value-display" id="hValue">h = 0</div>
    </div>
    <div class="control">
      <label for="aSlider">Traslación vertical (a)</label>
      <input type="range" id="aSlider" min="-5" max="5" step="0.5" value="0">
      <div class="value-display" id="aValue">a = 0</div>
    </div>
    <div class="control">
      <label for="kSlider">Escala vertical (k)</label>
      <input type="range" id="kSlider" min="-3" max="3" step="0.25" value="1">
      <div class="value-display" id="kValue">k = 1</div>
    </div>
  </div>

  <div class="formula-box" id="formula">g(x) = x²</div>
  <div id="errorBox"></div>
  <div id="plot"></div>
</div>

<script>
// Colores
const COLORS = {
  blue: '#667eea',
  gray: '#999999'
};

// Función base
function fnBase(type, x) {
  switch(type) {
    case 'linear': return x;
    case 'quad': return x * x;
    case 'cubic': return x * x * x;
    default: return x * x;
  }
}

// Generar array de números
function linspace(start, end, num = 200) {
  const arr = [];
  for (let i = 0; i < num; i++) {
    arr.push(start + (end - start) * i / (num - 1));
  }
  return arr;
}

// Actualizar gráfica
function updatePlot() {
  try {
    const errorBox = document.getElementById('errorBox');
    errorBox.innerHTML = '';
    
    const type = document.getElementById('baseFn').value;
    const h = parseFloat(document.getElementById('hSlider').value);
    const a = parseFloat(document.getElementById('aSlider').value);
    const k = parseFloat(document.getElementById('kSlider').value);
    
    // Actualizar displays
    document.getElementById('hValue').textContent = `h = ${h}`;
    document.getElementById('aValue').textContent = `a = ${a}`;
    document.getElementById('kValue').textContent = `k = ${k}`;
    
    // Actualizar fórmula
    const baseLabel = type === 'linear' ? 'x' : type === 'quad' ? 'x²' : 'x³';
    let formula = `g(x) = `;
    if (k !== 1) formula += k < 0 ? `−${Math.abs(k)}` : k;
    const hStr = h === 0 ? 'x' : h > 0 ? `(x − ${h})` : `(x + ${Math.abs(h)})`;
    const exp = type === 'linear' ? '' : type === 'quad' ? '²' : '³';
    formula += hStr + exp;
    if (a !== 0) formula += a > 0 ? ` + ${a}` : ` − ${Math.abs(a)}`;
    document.getElementById('formula').textContent = formula;
    
    // Generar datos
    const xs = linspace(-8, 8, 300);
    const ysBase = xs.map(x => fnBase(type, x));
    const ysNew = xs.map(x => k * fnBase(type, x - h) + a);
    
    // Crear trazas
    const trace1 = {
      x: xs,
      y: ysBase,
      mode: 'lines',
      name: `f(x) = ${baseLabel}`,
      line: { color: COLORS.gray, dash: 'dot', width: 2 }
    };
    
    const trace2 = {
      x: xs,
      y: ysNew,
      mode: 'lines',
      name: 'g(x)',
      line: { color: COLORS.blue, width: 3 }
    };
    
    // Layout
    const yRange = type === 'cubic' ? [-15, 15] : [-6, 15];
    const layout = {
      title: '',
      xaxis: { range: [-6, 6] },
      yaxis: { range: yRange },
      hovermode: 'closest',
      margin: { l: 60, r: 40, t: 20, b: 50 }
    };
    
    // Renderizar
    if (typeof Plotly !== 'undefined') {
      Plotly.newPlot('plot', [trace1, trace2], layout, { responsive: true });
    } else {
      errorBox.innerHTML = '<div class="error">Error: Plotly no cargado</div>';
    }
  } catch (error) {
    console.error('Error:', error);
    document.getElementById('errorBox').innerHTML = `<div class="error">Error: ${error.message}</div>`;
  }
}

// Event listeners
document.getElementById('baseFn').addEventListener('change', updatePlot);
document.getElementById('hSlider').addEventListener('input', updatePlot);
document.getElementById('aSlider').addEventListener('input', updatePlot);
document.getElementById('kSlider').addEventListener('input', updatePlot);

// Inicializar cuando Plotly esté listo
function startApp() {
  if (typeof Plotly === 'undefined') {
    setTimeout(startApp, 50);
    return;
  }
  updatePlot();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startApp);
} else {
  startApp();
}
</script>

</body>
</html>
